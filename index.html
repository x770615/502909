<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        body {
            background: url("0001.jpg") no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image-container{
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .circle-image{
            border-radius: 50%;
            width: 200px;
            height: 200px;
            object-fit: cover;
        }
        .caption{
            color: #000000;
            font-size: 16px;
        }
        .login-box {
            width: 320px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(17, 203, 191, 0.2);
        }
        .input-box {
            margin-bottom: 20px;
        }
        .input-box label {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        .input-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .input-box input:focus {
            border-color: #66afe9;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .signature {
            position: absolute;
            bottom: 30px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            color: #4688ec;
            opacity: 0.9;
            font-style: italic;
            text-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img class="circle-image" src="0002.jpg" alt="">
        <div class="caption"><strong>Agonie  Estrella</strong></div>
        
        <div class="login-box">
            <div class="input-box">
                <label>账号</label>
                <input type="text" id="username" placeholder="请输入你的账号">
            </div>
            <div class="input-box">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入你的密码">
            </div>
            <button class="btn" onclick="loginCheck()">登录</button>
        </div>
    </div>
    <div class="signature">
     ✨日落尤其温柔，人间皆是浪漫✨
    </div>

    <script>
        const FIXED_USER = "20210503";
        const FIXED_PWD = "05020909";
        
        function loginCheck() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            
            if (!username || !password) {
                alert("请输入账号和密码！");
                return;
            }
            
            if (username === FIXED_USER && password === FIXED_PWD) {
                alert("登录成功！欢迎使用");
                window.location.href = "首页.html"; 
            } else {
                alert("账号或密码错误，请重新输入！");
            }
        }
        
        window.addEventListener('load', function() {
            setTimeout(() => {
                confirm("欢迎来到由Mr.Xiao制作的网页");
            }, 60);
        });
    </script>
</body>
</html>
