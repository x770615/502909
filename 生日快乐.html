<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        .birthday-text {
            color: #f8c8e0;
            font-size: 5vw;
            font-weight: bold;
            text-shadow: 0 0 10px #ff88cc, 0 0 20px #ff88cc, 0 0 30px #ff88cc;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        .wish-text {
            color: #fff;
            font-size: 1.5vw;
            margin-bottom: 40px;
            opacity: 0.8;
        }
        .cake-container {
            position: relative;
            width: 400px;
            height: 300px;
        }
        .candle {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .candle-stick {
            width: 15px;
            height: 80px;
            background: linear-gradient(90deg, #f8f8f8 0%, #ffffff 50%, #f8f8f8 100%);
            border-radius: 4px 4px 2px 2px;
            position: relative;
            box-shadow: 
                0 0 5px #fff,
                inset 0 0 3px #e0e0e0,
                2px 0 2px rgba(0,0,0,0.1);
            transform: rotate(-1deg);
        }
        .candle-stick::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            height: 60px;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.05) 3px,
                rgba(0,0,0,0.05) 4px
            );
            opacity: 0.5;
        }

        .candle-top {
            width: 20px;
            height: 15px;
            background: linear-gradient(to bottom, #ffdd44, #ffcc00);
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 0 -2px 3px rgba(0,0,0,0.2);
        }
        .flame {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 40px;
            background: linear-gradient(to bottom, #fffd98, #ff9900, #ff5500);
            border-radius: 50% 50% 20% 20%;
            opacity: 0;
        }
        .cake {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
        }
        .cake-layer-1 {
            width: 100%;
            height: 120px;
            background: linear-gradient(
                135deg,
                #f9d0e3 0%,
                #f8c8e0 50%,
                #f5b8d5 100%
            );
            border-radius: 15px 15px 0 0;
            position: absolute;
            bottom: 0;
            box-shadow: 
                0 0 25px #ff88cc, 
                inset 0 0 20px #ff66bb,
                0 8px 10px rgba(0,0,0,0.2),
                inset 0 -10px 15px rgba(255, 102, 187, 0.3);
            border-bottom: 8px solid #e8a8c8;
        }
        .cake-layer-1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 30%, rgba(255,255,255,0.2) 0%, transparent 60%),
                repeating-linear-gradient(
                    to right,
                    transparent 0px,
                    transparent 8px,
                    rgba(255, 153, 221, 0.1) 8px,
                    rgba(255, 153, 221, 0.1) 10px
                );
            border-radius: 15px 15px 0 0;
            pointer-events: none;
        }
        .cake-layer-2 {
            width: 180px;
            height: 80px;
            background: linear-gradient(
                135deg,
                #ffffff 0%,
                #fefefe 50%,
                #f5f5f5 100%
            );
            border-radius: 12px 12px 0 0;
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 
                0 0 20px #fff, 
                inset 0 0 15px #f0f0f0,
                0 6px 8px rgba(0,0,0,0.15),
                inset 0 -8px 12px rgba(240,240,240,0.4);
            border-top: 5px solid #ffffff;
        }
        .cake-layer-2::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 10px;
            background: repeating-linear-gradient(
                45deg,
                #ffffff 0px,
                #ffffff 4px,
                #f8f8f8 4px,
                #f8f8f8 8px
            );
            border-radius: 50% 50% 0 0;
            opacity: 0.8;
        }
        .cake::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 15px;
            background: radial-gradient(ellipse at center, rgba(255, 136, 204, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="birthday-text">Happy Birthday</div>
    <div class="wish-text">BEST WISHES FOR YOU</div>
    
    <div class="cake-container">
        <!-- 蜡烛 -->
        <div class="candle">
            <div class="flame" id="flame"></div>
            <div class="candle-top"></div>
            <div class="candle-stick"></div>
        </div>
        
        <!-- 蛋糕 -->
        <div class="cake">
            <div class="cake-layer-1"></div>
            <div class="cake-layer-2"></div>
        </div>
    </div>
</body>
</html>
